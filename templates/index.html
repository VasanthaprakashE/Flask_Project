<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Google Sheet Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

     <link href="    https://cdn.datatables.net/2.3.8/css/dataTables.dataTables.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="fw-bold mb-1">
                <i class="bi bi-speedometer2 text-primary"></i>
                Google Sheet Dashboard
            </h2>

            <p class="text-secondary mb-0">
                {{ message }}
            </p>
        </div>

        <div class="badge bg-primary fs-6 px-4 py-3 rounded-pill shadow">
            
            <p class="mb-0">
               <i class="bi bi-calendar-event-fill"></i> current date  {{ date }}
            </p>
            
        </div>

    </div>

    <!-- KPI Cards -->

    <div class="row g-4 mb-4">

        <!-- Total Deployments -->

        <div class="col-lg-3 col-md-6">

            <div class="card border-0 shadow h-100">

                <div class="card-body d-flex justify-content-between align-items-center">

                    <div>

                        <small class="text-uppercase text-secondary fw-semibold">
                            Total Deployments
                        </small>

                        <h2 class="fw-bold text-primary mb-0">
                            {{ total_rows }}
                        </h2>

                    </div>

                    <div class="bg-primary bg-opacity-10 rounded-circle p-3">

                        <i class="bi bi-truck -upload-fill fs-2 text-primary"></i>

                    </div>

                </div>

            </div>

        </div>

        <!-- Total Zones -->

        <div class="col-lg-3 col-md-6">

            <div class="card border-0 shadow h-100">

                <div class="card-body d-flex justify-content-between align-items-center">

                    <div>

                        <small class="text-uppercase text-secondary fw-semibold">
                            Total Zones
                        </small>

                        <h2 class="fw-bold text-success mb-0">
                            {{ total_zone }}
                        </h2>

                    </div>

                    <div class="bg-success bg-opacity-10 rounded-circle p-3">

                        <i class="bi bi-globe-central-south-asia fs-2 text-success"></i>

                    </div>

                </div>

            </div>

        </div>



    </div>

    <!-- Table -->

    <div class="card border-0 shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <span>
                <i class="bi bi-truck"></i>
                Deployment Details
            </span>

            <span class="badge bg-light text-dark">
                {{ total_rows }} Records
            </span>

        </div>

        <div class="card-body">

            <div id="example" class="table-responsive">

                {{ table|safe }}

            </div>

        </div>

    </div>

</div>
<script src="https://cdn.datatables.net/2.3.8/js/dataTables.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
